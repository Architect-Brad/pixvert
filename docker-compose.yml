services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=http://localhost:3000
      - PUBLIC_API_BASE=http://api:3001
    depends_on:
      - api
    restart: unless-stopped
